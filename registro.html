<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar alumnos</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="CSS/hover-min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
</head>
<body >
        <header>
      <nav class="animate__animated animate__fadeIn">
        <div id="iconos" class="cfondo2 ">
          <ul>
            <li><a href="menu.html"><p style="color: #F2E3D5;">Regresar</p></a></li>
            <li><a href=""></a></li>
            <li><a href=""></a></li>
            <li><a href=""><p style="color: #F2E3D5;">Cerrar sesion</p></a></li>
          </ul>
        </div>
      </nav>
    </header>

    <div class="titulo animate__animated animate__fadeIn">
    <h1>Registro de alumno</h1>
    <h2 style="margin-top: 10px;">LLena los campos</h2>
    </div>
    <form action="" class="animate__animated animate__fadeIn">
        <div class="parent registro">
        <div class="div1"><label for="nombre" class="fila_label">Nombre: </label><input type="text" name="nombre" class="fila_input" required> </div>
        <div class="div2"><label for="app" class="fila_label">Apellido Paterno: </label><input type="text" name="app" class="fila_input" required> </div>
        <div class="div3"><label for="apm" class="fila_label">Apellido materno: </label><input type="text" name="apm" class="fila_input" required> </div>
        <div class="div4"><label for="telefono" class="fila_label">Telefono: </label><input type="text" name="telefono" class="fila_input" required> </div>
        <div class="div5"><label for="estado" class="fila_label">Estado: </label><input type="text" name="estado" class="fila_input" required> </div>
        <div class="div6"><label for="colonia" class="fila_label">Colonia: </label><input type="text" name="colonia" class="fila_input" required> </div>
        <div class="div7"><label for="numext" class="fila_label">Numero exterior: </label><input type="text" name="numext" class="fila_input" required> </div>
        <div class="div8"><label for="carrera" class="fila_label">Carrera: </label><select name="carrera" id="carrera" class="fila_input">
            <option value="1">Ingenieria en sistemas</option>
            <option value="2">Ingenieria en mecatronica</option>
            <option value="3">Ingenieria industrial</option>
            <option value="4">Ingenieria mecanica</option>
        </select> 
        </div>
        <div class="div9"><label for="direccion" class="fila_label">Direccion:</label><input type="text" name="direccion" class="fila_input" required> </div>
        <button class="registrar hvr-fade" type="submit">Registrar alumno</button> 
        </div> 
    </form>
</body>
</html>
