<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar alumnos</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>

<div class="container">
    <h1>Registrar alumnos</h1>

    <form class="formulario">
        <div class="fila">
            <label>Nombre:</label>
            <input type="text">
        </div>

        <div class="fila">
            <label>Apellido Paterno:</label>
            <input type="text">
        </div>

        <div class="fila">
            <label>Apellido materno</label>
            <input type="text">
        </div>

        <div class="fila">
            <label>Telefono</label>
            <input type="text">
        </div>

        <div class="fila">
            <label>Estado:</label>
            <input type="text">
        </div>

        <div class="fila">
            <label>Colonia:</label>
            <input type="text">
        </div>

        <div class="fila">
            <label>Numero exterior:</label>
            <input type="text">
        </div>

        <div class="btn-container">
            <button type="submit">Registrar alumno</button>
        </div>
    </form>
</div>

</body>
</html>
